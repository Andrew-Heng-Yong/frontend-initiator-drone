<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thermal Node</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="header-left">
          <button id="start-toggle" class="start">Start node</button>
          <p id="connection">Waiting to start.</p>
        </div>
        <div class="cpu-mini" id="cpu-mini" aria-hidden="false"></div>
        <div class="status"><span id="status-dot"></span><span id="status-text">Stopped</span></div>
      </header>
      <div class="content">
      <section class="controls" aria-label="Thermal node controls">
        <button id="start-button" class="start" style="display:none">Start node</button>
        <button id="stop-button" class="stop" disabled style="display:none">Stop node</button>
      </section>
      <!-- Large CPU panel removed; compact CPU shown in header -->
      <section class="viewer" aria-labelledby="thermal-heading">
        <div class="viewer-heading">
          <div><p class="eyebrow">rgb camera + thermal overlay</p><h2 id="thermal-heading">Live thermal image</h2></div>
          <div class="viewer-tools">
            <label class="overlay-alpha">
              <span>Overlay</span>
              <input id="overlay-alpha" type="range" min="0" max="100" value="45" />
              <output id="overlay-alpha-value">45</output>
            </label>
            <div id="range">--</div>
          </div>
        </div>
        <canvas id="thermal-canvas" width="32" height="24" aria-label="Thermal image from MLX90640"></canvas>
      </section>
      </div>
      <section class="log-panel">
        <div id="log-resize-handle" class="log-resize-handle" title="Drag to resize launch output"></div>
        <div class="log-header">
          <h2>Launch output</h2>
          <div class="log-actions">
            <button id="copy-logs" class="clear">Copy</button>
            <button id="clear-logs" class="clear">Clear</button>
          </div>
        </div>
        <pre id="logs">No launch output yet.</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
