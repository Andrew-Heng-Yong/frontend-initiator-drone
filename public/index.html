<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thermal Node</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div><p class="eyebrow">ROS 2 / MLX90640</p><h1>Thermal node</h1></div>
        <div class="status"><span id="status-dot"></span><span id="status-text">Stopped</span></div>
      </header>
      <section class="controls" aria-label="Thermal node controls">
        <button id="start-button" class="start">Start node</button>
        <button id="stop-button" class="stop" disabled>Stop node</button>
        <p id="connection">Waiting to start.</p>
      </section>
      <section class="viewer" aria-labelledby="thermal-heading">
        <div class="viewer-heading"><div><p class="eyebrow">thermal/image_raw</p><h2 id="thermal-heading">Live thermal image</h2></div><div id="range">—</div></div>
        <canvas id="thermal-canvas" width="32" height="24" aria-label="Thermal image from MLX90640"></canvas>
        <div class="legend"><span>cool</span><div></div><span>hot</span></div>
        <p id="empty-state">Start the node to receive frames.</p>
      </section>
      <section class="log-panel"><h2>Launch output</h2><pre id="logs">No launch output yet.</pre></section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
